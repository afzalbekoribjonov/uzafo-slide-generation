services:
  - type: web
    name: slide-generator-bot
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python -m app.main
    healthCheckPath: /healthz
    envVars:
      - key: APP_MODE
        value: webhook
      - key: WEBHOOK_PATH
        value: /telegram/webhook
      - key: WEBHOOK_DROP_PENDING_UPDATES
        value: "false"
